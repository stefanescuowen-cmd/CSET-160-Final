{% extends "base.html" %}

{% block content %}
<h1>{{ test.title }}</h1>

<h2>Questions:</h2>

<ul>
    {% for question in test.questions %}
        <li>{{ question.question_text }}</li>
    {% else %}
        <li>No questions added yet.</li>
    {% endfor %}
</ul>

<a href="/tests">Back to Tests</a>
{% endblock %}
