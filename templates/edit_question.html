{% extends "base.html" %}

{% block content %}
<h1>Edit Question</h1>

<form method="POST">
    <label>Question Text:</label>
    <input type="text" name="question_text" value="{{ question.question_text }}" required>
    <br><br>
    <label>Type:</label>
    <select name="type">
        <option value="open_ended" {% if question.type == "open_ended" %}selected{% endif %}>Open Ended</option>
        <option value="mcq" {% if question.type == "mcq" %}selected{% endif %}>MCQ</option>
    </select>
    <br><br>
    <button type="submit">Save Changes</button>
</form>

<a href="/test/{{ question.test_id }}/edit">Back to Edit Test</a>
{% endblock %}
