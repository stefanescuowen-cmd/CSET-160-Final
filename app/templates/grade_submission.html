{% extends "base.html" %}

{% block content %}
<style>
    /* Container & Layout */
    .grade-container {
        max-width: 600px;
        margin: 3rem auto;
        padding: 0 1rem;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    /* Info Header Card */
    .info-card {
        background: #f8fafc;
        border: 1px border #e2e8f0;
        border-radius: 1rem;
        padding: 1.5rem;
        margin-bottom: 2rem;
    }
    .info-label {
        font-size: 0.75rem;
        font-weight: 700;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.25rem;
    }
    .info-value {
        font-size: 1.125rem;
        font-weight: 600;
        color: #1e293b;
        margin-bottom: 1rem;
    }
    .info-value:last-child { margin-bottom: 0; }

    /* Form Styling */
    .grade-card {
        background: white;
        border-radius: 1rem;
        border: 1px solid #e5e7eb;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        overflow: hidden;
    }
    .card-header {
        padding: 1.25rem 2rem;
        background: #ffffff;
        border-bottom: 1px solid #f1f5f9;
    }
    .card-header h1 {
        margin: 0;
        font-size: 1.25rem;
        font-weight: 800;
        color: #0f172a;
    }

    .form-body { padding: 2rem; }
    .form-group { margin-bottom: 1.5rem; }
    
    .label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        color: #334155;
        margin-bottom: 0.5rem;
    }

    .input-field, .select-field {
        width: 100%;
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        border: 1px solid #cbd5e1;
        background-color: #ffffff;
        font-size: 1rem;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .input-field:focus, .select-field:focus {
        outline: none;
        border-color: #6366f1;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    }

    /* Submit Button */
    .btn-submit {
        width: 100%;
        padding: 0.875rem;
        margin-top: 1rem;
        background-color: #4f46e5;
        color: white;
        font-weight: 700;
        font-size: 1rem;
        border-radius: 0.75rem;
        border: none;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
    }
    .btn-submit:hover {
        background-color: #4338ca;
        transform: translateY(-1px);
        box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
    }
    .btn-submit:active { transform: translateY(0); }
</style>

<div class="grade-container">
    <!-- Context Header -->
    <div class="info-card">
        <div class="info-label">Student</div>
        <div class="info-value">{{ submission.student.name }}</div>
        
        <div class="info-label">Assessment</div>
        <div class="info-value">{{ submission.test.title }}</div>
    </div>

    <!-- Grading Form -->
    <div class="grade-card">
        <div class="card-header">
            <h1>Grade Submission</h1>
        </div>

        <form method="POST" class="form-body">
            <div class="form-group">
                <label class="label" for="marks">Awarded Marks</label>
                <input type="number" id="marks" name="marks" 
                    class="input-field" 
                    value="{{ submission.marks or 0 }}" 
                    min="0" 
                    placeholder="Enter score...">
            </div>

            <div class="form-group">
                <label class="label" for="teacher_id">Grading Instructor</label>
                <select name="teacher_id" id="teacher_id" class="select-field" required>
                    <option value="" disabled>Select teacher...</option>
                    {% for teacher in teachers %}
                    <option value="{{ teacher.id }}"
                        {% if submission.graded_by == teacher.id %}selected{% endif %}>
                        {{ teacher.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="btn-submit">Confirm & Submit Grade</button>
        </form>
    </div>
</div>
{% endblock %}
