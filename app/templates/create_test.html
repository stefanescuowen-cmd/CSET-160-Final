{% extends "base.html" %}

{% block content %}

<style>
.form-container {
    max-width: 520px;
    margin: 60px auto;
    padding: 30px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.form-title {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 25px;
    color: #1e293b;
}
 
.form-group {
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
}

label {
    margin-bottom: 6px;
    font-weight: 500;
    color: #334155;
}

input, select {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #e2e8f0;
    background: #f8fafc;
    font-size: 0.95rem;
    transition: 0.2s;
}

input:focus, select:focus {
    outline: none;
    border-color: #2563eb;
    background: #ffffff;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
}

/* Checkbox styling */
.checkbox-group {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 500;
}

/* Hidden duration box */
.duration-box {
    display: none;
    animation: fadeIn 0.2s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
}

.submit-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: #2563eb;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.25s;
    margin-top: 10px;
}

.submit-btn:hover {
    background: #1d4ed8;
    transform: translateY(-1px);
    box-shadow: 0 6px 14px rgba(37, 99, 235, 0.25);
}

.back-link {
    display: inline-block;
    margin-top: 20px;
    color: #64748b;
    text-decoration: none;
    font-size: 0.9rem;
}

.back-link:hover {
    color: #2563eb;
}
</style>

<div class="form-container">
    <div class="form-title">Create New Test 📝</div>

    <form method="POST">

        <div class="form-group">
            <label>Test Title</label>
            <input type="text" name="title" placeholder="Enter test name..." required>
        </div>

        <div class="form-group">
            <label>Select Teacher</label>
            <select name="teacher_id" required>
                {% for teacher in teachers %}
                <option value="{{ teacher.id }}">{{ teacher.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group checkbox-group">
            <input type="checkbox" id="isTimed" name="is_timed" value="1">
            <label for="isTimed">Timed Test</label>
        </div>

        <!-- Hidden until checked -->
        <div class="form-group duration-box" id="durationBox">
            <label>Duration (minutes)</label>
            <input type="number" name="duration" min="1" placeholder="Enter duration">
        </div>

        <button type="submit" class="submit-btn">Create Test</button>

    </form>

    <a href="/tests" class="back-link">← Back to Tests</a>
</div>

<script>
const checkbox = document.getElementById("isTimed");
const durationBox = document.getElementById("durationBox");

checkbox.addEventListener("change", () => {
    if (checkbox.checked) {
        durationBox.style.display = "block";
    } else {
        durationBox.style.display = "none";
    }
});
</script>

{% endblock %}
