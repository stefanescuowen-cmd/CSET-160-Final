{% extends "base.html" %}

{% block content %}
<style>
    .edit-container {
        max-width: 800px;
        margin: 50px auto;
        padding: 30px;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        font-family: 'Inter', -apple-system, sans-serif;
    }

    .section {
        margin-bottom: 40px;
        padding-bottom: 20px;
        border-bottom: 1px solid #f1f5f9;
    }

    .section:last-of-type { border-bottom: none; }

    h1, h2, h3 { color: #1a202c; margin-bottom: 20px; }
    h1 { font-size: 1.75rem; border-bottom: 2px solid #4a90e2; display: inline-block; padding-bottom: 5px; }
    h2 { font-size: 1.4rem; margin-top: 10px; }
    h3 { font-size: 1.1rem; color: #4a5568; }

    .form-group { margin-bottom: 18px; }

    label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #4a5568;
        font-size: 0.9rem;
    }

    input[type="text"], input[type="number"], select {
        width: 100%;
        padding: 12px;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        font-size: 0.95rem;
        transition: all 0.2s;
        background: #f8fafc;
    }

    input:focus, select:focus {
        outline: none;
        border-color: #4a90e2;
        background: white;
        box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
    }

    .checkbox-group {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 500;
    }

    .duration-box {
        display: none;
        animation: fadeIn 0.2s ease-in-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-5px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn {
        padding: 10px 20px;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        border: none;
    }

    .btn-primary {
        background: #4a90e2;
        color: white;
    }

    .btn-primary:hover {
        background: #357abd;
        transform: translateY(-1px);
        box-shadow: 0 6px 14px rgba(74, 144, 226, 0.25);
    }

    .btn-add {
        background: #10b981;
        color: white;
        margin-top: 10px;
    }

    .btn-add:hover {
        background: #059669;
        transform: translateY(-1px);
    }

    .btn-delete {
        background: #fee2e2;
        color: #dc2626;
        padding: 6px 12px;
        font-size: 0.85rem;
    }

    .btn-delete:hover { background: #fecaca; }

    .question-list { list-style: none; padding: 0; }

    .question-item {
        background: #f8fafc;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 1px solid #edf2f7;
        transition: 0.2s;
    }

    .question-item:hover {
        border-color: #c7d2fe;
        background: #f1f5ff;
    }

    .question-text { font-weight: 500; color: #2d3748; }

    .question-type {
        font-size: 0.7rem;
        background: #e2e8f0;
        padding: 3px 8px;
        border-radius: 6px;
        margin-left: 10px;
        text-transform: uppercase;
    }

    .back-link {
        display: inline-block;
        margin-top: 20px;
        color: #718096;
        text-decoration: none;
        font-weight: 500;
    }

    .back-link:hover { color: #4a5568; }
</style>

<div class="edit-container">

    <!-- TEST INFO -->
    <div class="section">
        <h1>Edit Test</h1>

        <form method="POST">
            <div class="form-group">
                <label>Test Title</label>
                <input type="text" name="title" value="{{ test.title }}" required>
            </div>

            <div class="form-group">
                <label>Assigned Teacher</label>
                <select name="teacher_id" required>
                    {% for teacher in teachers %}
                    <option value="{{ teacher.id }}" {% if test.teacher_id == teacher.id %}selected{% endif %}>
                        {{ teacher.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="isTimed" name="is_timed" value="1" {% if test.is_timed %}checked{% endif %}>
                <label for="isTimed">Timed Test</label>
            </div>

            <div class="form-group duration-box" id="durationBox">
                <label>Duration (minutes)</label>
                <input type="number" name="duration" min="1" value="{{ test.duration or '' }}">
            </div>

            <button type="submit" class="btn btn-primary">Save Test Info</button>
        </form>
    </div>

    <!-- QUESTIONS -->
    <div class="section">
        <h2>Questions</h2>
        <ul class="question-list">
            {% for question in test.questions %}
            <li class="question-item">
                <div>
                    <span class="question-text">{{ question.question_text }}</span>
                    <span class="question-type">{{ question.type }}</span>
                </div>
                <div style="display:flex; gap:10px;">
                    <a href="/question/{{ question.id }}/edit">Edit</a>
                    <form method="POST" action="/question/{{ question.id }}/delete">
                        <button type="submit" class="btn btn-delete">Delete</button>
                    </form>
                </div>
            </li>
            {% endfor %}
        </ul>
    </div>

    <!-- ADD QUESTION -->
    <div class="section">
        <h3>Add New Question</h3>

        <form method="POST" action="/test/{{ test.id }}/add_question">
            <div class="form-group">
                <label>Question Text</label>
                <input type="text" name="question_text" required>
            </div>

            <div class="form-group">
                <label>Question Type</label>
                <select name="type" id="question-type-select">
                    <option value="open">Open Ended</option>
                    <option value="mcq">MCQ</option>
                </select>
            </div>

            <div id="mcq-options" style="display:none;">
                <div class="form-group">
                    <input type="text" name="option_a" placeholder="Option A">
                </div>
                <div class="form-group">
                    <input type="text" name="option_b" placeholder="Option B">
                </div>
                <div class="form-group">
                    <input type="text" name="option_c" placeholder="Option C">
                </div>
                <div class="form-group">
                    <input type="text" name="option_d" placeholder="Option D">
                </div>

                <div class="form-group">
                    <select name="correct_answer">
                        <option value="A">Correct: A</option>
                        <option value="B">Correct: B</option>
                        <option value="C">Correct: C</option>
                        <option value="D">Correct: D</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-add">+ Add Question</button>
        </form>
    </div>

    <a href="/tests" class="back-link">← Back to All Tests</a>
</div>

<script>
// Run AFTER page loads
document.addEventListener("DOMContentLoaded", () => {

    // Timer toggle
    const checkbox = document.getElementById("isTimed");
    const durationBox = document.getElementById("durationBox");

    function toggleDuration() {
        durationBox.style.display = checkbox.checked ? "block" : "none";
    }

    toggleDuration();
    checkbox.addEventListener("change", toggleDuration);

    // MCQ toggle
    const typeSelect = document.getElementById("question-type-select");
    const mcqOptions = document.getElementById("mcq-options");

    function toggleMCQ() {
        mcqOptions.style.display = typeSelect.value === "mcq" ? "block" : "none";
    }

    toggleMCQ();
    typeSelect.addEventListener("change", toggleMCQ);
});
</script>

{% endblock %}
