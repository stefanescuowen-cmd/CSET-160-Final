{% extends "base.html" %}

{% block content %}
<style>
    .test-container {
        max-width: 800px;
        margin: 3rem auto;
        padding: 0 1.5rem;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    /* Header Styling */
    .test-header {
        margin-bottom: 2.5rem;
    }
    .test-title {
        font-size: 2.25rem;
        font-weight: 800;
        color: #111827;
        margin-bottom: 0.5rem;
    }
    .test-meta {
        color: #6b7280;
        font-size: 0.95rem;
    }

    /* Form Layout */
    .test-form {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }

    /* Student Selector Card */
    .selector-card {
        background: #f3f4f6;
        padding: 1.5rem;
        border-radius: 1rem;
        border: 1px solid #e5e7eb;
        margin-bottom: 1rem;
    }

    /* Question Cards */
    .question-card {
        background: white;
        padding: 2rem;
        border-radius: 1rem;
        border: 1px solid #e5e7eb;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        transition: border-color 0.2s;
    }
    .question-card:focus-within {
        border-color: #4f46e5;
    }

    /* Labels & Inputs */
    .label {
        display: block;
        font-size: 1rem;
        font-weight: 600;
        color: #374151;
        margin-bottom: 1rem;
        line-height: 1.5;
    }
    .input-field, .select-field {
        width: 100%;
        padding: 0.875rem 1rem;
        border-radius: 0.75rem;
        border: 1px solid #d1d5db;
        background-color: white;
        font-size: 1rem;
        transition: all 0.2s;
    }
    .input-field:focus {
        outline: none;
        border-color: #4f46e5;
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }

    /* Submit Button */
    .submit-container {
        margin-top: 1rem;
        padding-top: 2rem;
        border-top: 1px solid #e5e7eb;
        display: flex;
        justify-content: flex-end;
    }
    .btn-submit {
        padding: 1rem 3rem;
        background-color: #4f46e5;
        color: white;
        font-weight: 700;
        font-size: 1rem;
        border-radius: 0.75rem;
        border: none;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
    }
    .btn-submit:hover {
        background-color: #4338ca;
        transform: translateY(-2px);
    }
</style>

<div class="test-container">
    <header class="test-header">
        <h1 class="test-title">{{ test.title }}</h1>
        <p class="test-meta">Instructor: <span style="font-weight: 600; color: #111827;">{{ test.teacher.name }}</span></p>
        {% if test.is_timed %}
        <p id="timer" style="color: #dc2626; font-weight: 700;"></p>
        {% endif %}
    </header>

    <form method="POST" class="test-form">
        <input type="hidden" name="start_time" value="{{ datetime.utcnow().isoformat() }}">

        <!-- Student Selection -->
        <div class="selector-card">
            <label class="label">Select Student</label>
            <select name="student_id" class="select-field" required>
                <option value="" disabled selected>Choose a student...</option>
                {% for student in students %}
                <option value="{{ student.id }}">{{ student.name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Questions -->
        {% for question in test.questions %}
        <div class="question-card">
            <label class="label">
                <span style="color: #4f46e5;">{{ loop.index }}.</span> {{ question.question_text }}
            </label>
            <textarea name="question_{{ question.id }}" class="input-field" rows="4" placeholder="Type your response..." required></textarea>
        </div>
        {% endfor %}

        <div class="submit-container">
            <button type="submit" class="btn-submit">Submit Assessment</button>
        </div>
    </form>
</div>

{% if test.is_timed %}
<script>
let timeLeft = parseInt("{{ test.duration | default(0) }}") * 60; // duration in seconds
const timerEl = document.getElementById('timer');

if(timeLeft > 0) {
    const countdown = setInterval(() => {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        timerEl.textContent = `Time Remaining: ${minutes}:${seconds.toString().padStart(2,'0')}`;
        if(timeLeft <= 0) {
            clearInterval(countdown);
            timerEl.textContent = "Time's up!";
            alert("Time is up! Please submit your test now.");
        }
        timeLeft--;
    }, 1000);
} else {
    timerEl.textContent = "No timer set";
}
</script>
{% endif %}
{% endblock %}
