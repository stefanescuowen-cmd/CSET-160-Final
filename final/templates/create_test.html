{% extends "base.html" %}

{% block content %}
<h1>Create Test</h1>
<form method="post">
    <input type="text" name="title" placeholder="Test Title" required>

    <select name="teacher_id" required>
        {% for teacher in teachers %}
        <option value="{{ teacher.id }}">{{ teacher.name }}</option>
        {% endfor %}
    </select>

    <label>
        <input type="checkbox" name="is_timed"> Timed Test
    </label>
    <input type="number" name="duration" placeholder="Duration (minutes)">

    <button type="submit">Create Test</button>
</form>
{% endblock  %}
